<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectHub - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .theme-light {
            --bg-gradient-1: #667eea;
            --bg-gradient-2: #764ba2;
            --card-bg: rgba(255, 255, 255, 0.98);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --accent-2: #667eea;
            --accent-3: #764ba2;
            --accent-4: #f093fb;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border-light: rgba(0, 0, 0, 0.08);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .theme-dark {
            --bg-gradient-1: #0f0c29;
            --bg-gradient-2: #302b63;
            --card-bg: rgba(30, 41, 59, 0.98);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --accent-2: #60a5fa;
            --accent-3: #a78bfa;
            --accent-4: #f472b6;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle 20s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); }
            25% { transform: translateY(-80px) translateX(40px) scale(1.1); }
            50% { transform: translateY(-40px) translateX(80px) scale(0.9); }
            75% { transform: translateY(40px) translateX(40px) scale(1.05); }
        }

        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 1rem;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            z-index: 1000;
        }
        .theme-toggle:hover {
            transform: scale(1.1) rotate(10deg);
            background: rgba(255, 255, 255, 0.2);
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-2xl);
            animation: slideUp 0.6s ease;
            position: relative;
            z-index: 2;
            max-height: 90vh;
            overflow-y: auto;
        }

        .auth-card::-webkit-scrollbar {
            width: 6px;
        }
        .auth-card::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 10px;
        }
        .auth-card::-webkit-scrollbar-thumb {
            background: var(--accent-2);
            border-radius: 10px;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .auth-logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .auth-logo i {
            background: none;
            color: var(--accent-2);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: inherit;
            color: var(--text-primary);
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent-2);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .auth-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-light);
        }

        .auth-footer a {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 500;
        }

        .error-message, .success-message {
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error-message { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .success-message { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }

        .password-strength { font-size: 0.7rem; margin-top: 0.25rem; }
        .strength-weak { color: #ef4444; }
        .strength-medium { color: #f59e0b; }
        .strength-strong { color: #10b981; }
        .role-hint { font-size: 0.65rem; color: var(--text-tertiary); margin-top: 0.25rem; }

        @media (max-width: 768px) {
            .auth-card { padding: 1.2rem; margin: 0 1rem; }
            .auth-logo { font-size: 1.6rem; }
        }
    </style>
</head>
<body class="theme-light">
    <div class="particles" id="particles"></div>
    <button class="theme-toggle" id="themeToggleBtn">🌙</button>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-cube"></i>
                    <span>Project<span>Hub</span></span>
                </div>
                <div class="auth-subtitle">Create your account to get started</div>
            </div>

            <div id="errorMessage" class="error-message"><i class="fas fa-exclamation-circle"></i> <span id="errorText"></span></div>
            <div id="successMessage" class="success-message"><i class="fas fa-check-circle"></i> <span id="successText"></span></div>

            <form id="registerForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required autocomplete="name">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
                    <div class="password-strength" id="passwordStrength"></div>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-briefcase"></i> Select Role</label>
                    <select id="role" required>
                        <option value="project_manager">👤 Project Manager</option>
                        <option value="developer">👨‍💻 Developer</option>
                        <option value="designer">🎨 Designer</option>
                        <option value="tester">🧪 Tester</option>
                    </select>
                    <div class="role-hint"><i class="fas fa-info-circle"></i> Role determines your access level in the system</div>
                </div>
                <button type="submit" class="auth-btn"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign In <i class="fas fa-arrow-right"></i></a></p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var API_URL = 'http://localhost:5000';

            function createParticles() {
                var container = document.getElementById('particles');
                if (!container) return;
                container.innerHTML = '';
                var isDark = document.body.classList.contains('theme-dark');
                var colors = isDark 
                    ? ['rgba(168,85,247,0.3)', 'rgba(139,92,246,0.25)', 'rgba(192,132,252,0.2)']
                    : ['rgba(135,206,235,0.35)', 'rgba(100,149,237,0.3)', 'rgba(0,191,255,0.25)'];
                for (var i = 0; i < 30; i++) {
                    var p = document.createElement('div');
                    p.className = 'particle';
                    var s = Math.random() * 150 + 50;
                    p.style.cssText = 'width:' + s + 'px;height:' + s + 'px;left:' + Math.random() * 100 + '%;top:' + Math.random() * 100 + '%;animation-delay:' + (Math.random() * 20) + 's;animation-duration:' + (15 + Math.random() * 15) + 's;background:radial-gradient(circle,' + colors[i % colors.length] + ',transparent);opacity:' + (0.3 + Math.random() * 0.3);
                    container.appendChild(p);
                }
            }

            function setTheme(isDark) {
                var body = document.body;
                var btn = document.getElementById('themeToggleBtn');
                if (isDark) {
                    body.classList.remove('theme-light');
                    body.classList.add('theme-dark');
                    if (btn) btn.innerHTML = '☀️';
                    localStorage.setItem('theme', 'dark');
                } else {
                    body.classList.remove('theme-dark');
                    body.classList.add('theme-light');
                    if (btn) btn.innerHTML = '🌙';
                    localStorage.setItem('theme', 'light');
                }
                createParticles();
            }

            function toggleTheme() {
                setTheme(!document.body.classList.contains('theme-dark'));
            }

            function loadTheme() {
                var saved = localStorage.getItem('theme');
                setTheme(saved === 'dark');
            }

            function showError(msg) {
                var d = document.getElementById('errorMessage');
                var t = document.getElementById('errorText');
                if (t) t.textContent = msg;
                if (d) d.style.display = 'block';
                var s = document.getElementById('successMessage');
                if (s) s.style.display = 'none';
                setTimeout(function() { if (d) d.style.display = 'none'; }, 5000);
            }

            function showSuccess(msg) {
                var d = document.getElementById('successMessage');
                var t = document.getElementById('successText');
                if (t) t.textContent = msg;
                if (d) d.style.display = 'block';
                var e = document.getElementById('errorMessage');
                if (e) e.style.display = 'none';
                setTimeout(function() { if (d) d.style.display = 'none'; }, 3000);
            }

            document.addEventListener('DOMContentLoaded', function() {
                loadTheme();
                
                var themeBtn = document.getElementById('themeToggleBtn');
                if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
                
                var pwd = document.getElementById('password');
                if (pwd) {
                    pwd.addEventListener('input', function() {
                        var val = this.value;
                        var div = document.getElementById('passwordStrength');
                        if (!div) return;
                        if (val.length === 0) { 
                            div.innerHTML = ''; 
                            return; 
                        }
                        if (val.length >= 8 && /[A-Z]/.test(val) && /[0-9]/.test(val)) {
                            div.innerHTML = '<i class="fas fa-check-circle"></i> Strong password';
                            div.className = 'password-strength strength-strong';
                        } else if (val.length >= 6) {
                            div.innerHTML = '<i class="fas fa-chart-line"></i> Medium password';
                            div.className = 'password-strength strength-medium';
                        } else {
                            div.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Weak password';
                            div.className = 'password-strength strength-weak';
                        }
                    });
                }
                
                var form = document.getElementById('registerForm');
                if (form) {
                    form.addEventListener('submit', async function(e) {
                        e.preventDefault();
                        
                        var name = document.getElementById('name').value.trim();
                        var email = document.getElementById('email').value.trim();
                        var password = document.getElementById('password').value;
                        var confirmPassword = document.getElementById('confirmPassword').value;
                        var role = document.getElementById('role').value;
                        
                        if (!name || !email || !password || !role) {
                            showError('Please fill all fields');
                            return;
                        }
                        
                        if (password !== confirmPassword) {
                            showError('Passwords do not match');
                            return;
                        }
                        
                        if (password.length < 6) {
                            showError('Password must be at least 6 characters');
                            return;
                        }
                        
                        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        if (!emailRegex.test(email)) {
                            showError('Please enter a valid email address');
                            return;
                        }
                        
                        try {
                            var response = await fetch(API_URL + '/register', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    name: name,
                                    email: email,
                                    password: password,
                                    role: role
                                })
                            });
                            
                            var data = await response.json();
                            
                            if (response.ok) {
                                localStorage.setItem('temp_registered_user', JSON.stringify({
                                    name: name,
                                    email: email,
                                    role: role
                                }));
                                
                                showSuccess(data.message || 'Account created successfully! Redirecting to login...');
                                form.reset();
                                var strengthDiv = document.getElementById('passwordStrength');
                                if (strengthDiv) strengthDiv.innerHTML = '';
                                
                                setTimeout(function() {
                                    window.location.href = 'login.html';
                                }, 2000);
                            } else {
                                showError(data.message || data.error || 'Registration failed. Please try again.');
                            }
                        } catch (error) {
                            console.error('Registration error:', error);
                            showError('Cannot connect to server. Please make sure server is running on port 5000');
                        }
                    });
                }
            });
        })();
    </script>
</body>
</html>
