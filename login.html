<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectHub - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Light Theme */
        .theme-light {
            --bg-gradient-1: #667eea;
            --bg-gradient-2: #764ba2;
            --card-bg: rgba(255, 255, 255, 0.98);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --accent-2: #667eea;
            --accent-3: #764ba2;
            --accent-4: #f093fb;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-light: rgba(0, 0, 0, 0.08);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* Dark Theme */
        .theme-dark {
            --bg-gradient-1: #0f0c29;
            --bg-gradient-2: #302b63;
            --card-bg: rgba(30, 41, 59, 0.98);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --accent-2: #60a5fa;
            --accent-3: #a78bfa;
            --accent-4: #f472b6;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border-light: rgba(255, 255, 255, 0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            position: relative;
        }

        /* Particles Container */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle 20s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); }
            25% { transform: translateY(-80px) translateX(40px) scale(1.1); }
            50% { transform: translateY(-40px) translateX(80px) scale(0.9); }
            75% { transform: translateY(40px) translateX(40px) scale(1.05); }
        }

        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 1rem;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            z-index: 1000;
        }
        .theme-toggle:hover {
            transform: scale(1.1) rotate(10deg);
            background: rgba(255, 255, 255, 0.2);
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-2xl);
            animation: slideUp 0.6s ease;
            position: relative;
            z-index: 2;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .auth-logo i {
            background: none;
            -webkit-background-clip: unset;
            color: var(--accent-2);
        }

        .auth-logo span {
            background: linear-gradient(135deg, var(--accent-4), var(--accent-3));
            -webkit-background-clip: text;
            background-clip: text;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.3s;
            font-family: inherit;
            color: var(--text-primary);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-2);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        .input-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .auth-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-light);
        }

        .auth-footer p {
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .auth-footer a:hover {
            color: var(--accent-4);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .success-message {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        @media (max-width: 768px) {
            .auth-card {
                padding: 1.5rem;
                margin: 0 1rem;
            }
            .auth-logo {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body class="theme-light">
    <div class="particles" id="particles"></div>
    <button class="theme-toggle" id="themeToggleBtn">🌙</button>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-cube"></i>
                    <span>Project<span>Hub</span></span>
                </div>
                <div class="auth-subtitle">Project Management & Task Tracking System</div>
            </div>

            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
            </div>
            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle"></i> <span id="successText"></span>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="auth-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Create Account <i class="fas fa-arrow-right"></i></a></p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var API_URL = 'http://localhost:5000';

            function createParticles() {
                var container = document.getElementById('particles');
                if (!container) return;
                container.innerHTML = '';
                
                var isDark = document.body.classList.contains('theme-dark');
                
                var lightColors = [
                    'rgba(135, 206, 235, 0.35)', 'rgba(100, 149, 237, 0.3)',
                    'rgba(70, 130, 180, 0.25)', 'rgba(0, 191, 255, 0.3)',
                    'rgba(176, 224, 230, 0.35)', 'rgba(135, 206, 250, 0.3)'
                ];
                
                var darkColors = [
                    'rgba(168, 85, 247, 0.3)', 'rgba(139, 92, 246, 0.25)',
                    'rgba(192, 132, 252, 0.2)', 'rgba(126, 34, 206, 0.25)',
                    'rgba(147, 51, 234, 0.3)', 'rgba(216, 180, 254, 0.2)'
                ];
                
                var colors = isDark ? darkColors : lightColors;
                
                for (var i = 0; i < 30; i++) {
                    var particle = document.createElement('div');
                    particle.className = 'particle';
                    var size = Math.random() * 150 + 50;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDelay = Math.random() * 20 + 's';
                    particle.style.animationDuration = 15 + Math.random() * 15 + 's';
                    var colorIndex = Math.floor(Math.random() * colors.length);
                    particle.style.background = 'radial-gradient(circle, ' + colors[colorIndex] + ', transparent)';
                    particle.style.opacity = 0.3 + Math.random() * 0.3;
                    container.appendChild(particle);
                }
            }

            function setTheme(isDark) {
                var body = document.body;
                var btn = document.getElementById('themeToggleBtn');
                if (isDark) {
                    body.classList.remove('theme-light');
                    body.classList.add('theme-dark');
                    if (btn) btn.innerHTML = '☀️';
                    localStorage.setItem('theme', 'dark');
                } else {
                    body.classList.remove('theme-dark');
                    body.classList.add('theme-light');
                    if (btn) btn.innerHTML = '🌙';
                    localStorage.setItem('theme', 'light');
                }
                createParticles();
            }

            function toggleTheme() {
                var isDark = document.body.classList.contains('theme-dark');
                setTheme(!isDark);
            }

            function loadTheme() {
                var saved = localStorage.getItem('theme');
                if (saved === 'dark') {
                    setTheme(true);
                } else {
                    setTheme(false);
                }
            }

            function showError(msg) {
                var errDiv = document.getElementById('errorMessage');
                var errText = document.getElementById('errorText');
                if (errText) errText.textContent = msg;
                if (errDiv) errDiv.style.display = 'block';
                var successDiv = document.getElementById('successMessage');
                if (successDiv) successDiv.style.display = 'none';
                setTimeout(function() {
                    if (errDiv) errDiv.style.display = 'none';
                }, 5000);
            }

            function showSuccess(msg) {
                var successDiv = document.getElementById('successMessage');
                var successText = document.getElementById('successText');
                if (successText) successText.textContent = msg;
                if (successDiv) successDiv.style.display = 'block';
                var errDiv = document.getElementById('errorMessage');
                if (errDiv) errDiv.style.display = 'none';
                setTimeout(function() {
                    if (successDiv) successDiv.style.display = 'none';
                }, 3000);
            }

            // Event Listeners
            document.addEventListener('DOMContentLoaded', function() {
                loadTheme();
                
                var themeBtn = document.getElementById('themeToggleBtn');
                if (themeBtn) {
                    themeBtn.addEventListener('click', toggleTheme);
                }
                
                var loginForm = document.getElementById('loginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', async function(e) {
                        e.preventDefault();
                        
                        var emailInput = document.querySelector("input[name='email']");
                        var passwordInput = document.querySelector("input[name='password']");
                        
                        var email = emailInput ? emailInput.value : '';
                        var password = passwordInput ? passwordInput.value : '';
                        
                        var errDiv = document.getElementById('errorMessage');
                        var successDiv = document.getElementById('successMessage');
                        if (errDiv) errDiv.style.display = 'none';
                        if (successDiv) successDiv.style.display = 'none';
                        
                        if (!email || !password) {
                            showError("Please enter both email and password");
                            return;
                        }
                        
                        try {
                            var response = await fetch(API_URL + '/login', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email: email, password: password })
                            });
                            
                            var data = await response.json();
                            
                            if (data.token) {
                                var userData = {
                                    name: (data.user && data.user.name) ? data.user.name : email.split('@')[0],
                                    email: email,
                                    role: (data.user && data.user.role) ? data.user.role : 'developer',
                                    createdAt: (data.user && data.user.createdAt) ? data.user.createdAt : new Date().toISOString()
                                };
                                localStorage.setItem('token', data.token);
                                localStorage.setItem('user', JSON.stringify(userData));
                                showSuccess('Login Successful! Redirecting...');
                                setTimeout(function() {
                                    window.location.href = 'dashboard.html';
                                }, 1000);
                            } else {
                                showError(data.message || 'Login failed');
                            }
                        } catch(error) {
                            console.error(error);
                            showError('Server not reachable. Make sure server is running on port 5000');
                        }
                    });
                }
            });
        })();
    </script>
</body>
</html>
